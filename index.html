<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vender en casa</title>
  <link rel="stylesheet" href="styles.css">
</head>
  
<script>
function filtrar(categoria) {
  let productos = document.querySelectorAll('.producto');

  productos.forEach(producto => {
    if (categoria === 'all' || producto.classList.contains(categoria)) {
      producto.style.display = '';
    } else {
      producto.style.display = 'none';
    }
  });
}
</script>
  
<body>

<h1>Mi ropa en venta</h1>

<div class="categoria">
  <button onclick="filtrar('all')">Todo</button>
  <button onclick="filtrar('Sweaters')">Sweaters</button>
  <button onclick="filtrar('Top / Remeras')">Remeras / Top</button>
  <button onclick="filtrar('Pantalones')">Pantalones / Jean</button>
  <button onclick="filtrar('Short / Polleras')">Short / Polleras</button>
  <button onclick="filtrar('Deportivo')">Deportivo</button>
  <button onclick="filtrar('carteras')">Carteras</button>
  <button onclick="filtrar('camisas')">Camisas</button>
  <button onclick="filtrar('Zapatillas/Borcegos/Tacos')">Zapatillas/Borcegos/Tacos</button>
</div>

<div class="grid" id="productos"></div>

<script src="script.js"></script>
  
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vender en casa</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
  
<body>

<h1>Mi ropa en venta</h1>
<p class="subtitulo">Ropa usada y nueva en perfecto estado - Consultame por WhatsApp</p>

<div class="categoria">
  <button onclick="filtrar('all')">Todo</button>
  <button onclick="filtrar('Sweaters')">Sweaters</button>
  <button onclick="filtrar('Top / Remeras')">Remeras / Top</button>
  <button onclick="filtrar('Pantalones')">Pantalones / Jean</button>
  <button onclick="filtrar('Short / Polleras')">Short / Polleras</button>
  <button onclick="filtrar('Cartera')">Carteras</button>
  <button onclick="filtrar('Vestidos')">Vestidos</button>
  <button onclick="filtrar('Camisa')">Camisas</button>
  <button onclick="filtrar('Campera')">Camperas</button>
  <button onclick="filtrar('Zapatillas/Borcegos/Tacos')">Zapatillas/Borcegos/Tacos</button>
</div>

<div class="grid" id="productos"></div>

<script src="script.js"></script>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="cerrarModal()">&times;</span>
    <img id="modal-img">
    <h2 id="modal-nombre"></h2>
    <p id="modal-talle"></p>
    <p id="modal-precio"></p>
    <a id="modal-link" target="_blank">Comprar</a>
  </div>
</div>
  
</body>
</html>
